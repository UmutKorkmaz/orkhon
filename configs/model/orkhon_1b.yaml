# ~1B params. Upper bound for V1 ambition; multi-GPU / FSDP2 for a real run.
vocab_size: 32768
block_size: 2048
n_layers: 24
d_model: 2048
n_heads: 16
n_kv_heads: 4
intermediate_size: 5632
norm_eps: 1.0e-5
rope_theta: 10000.0
dropout: 0.0
init_std: 0.02
use_bias: false
tie_word_embeddings: true
attn_impl: auto
