# ~22M params. Small enough to train on Apple Silicon (MPS) in well under an hour,
# large enough to write fluent, coherent TinyStories-style English.
vocab_size: 8192
block_size: 512
n_layers: 6
d_model: 512
n_heads: 8
n_kv_heads: 4
intermediate_size: 1408
norm_eps: 1.0e-5
rope_theta: 10000.0
dropout: 0.0
init_std: 0.02
use_bias: false
tie_word_embeddings: true
attn_impl: auto
