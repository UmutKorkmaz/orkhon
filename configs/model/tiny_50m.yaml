# ~51M params. The largest model that still trains comfortably on a single
# local device (Apple Silicon MPS / one consumer GPU) in a few hours, while being
# big enough to learn real-web English from FineWeb-Edu (not just TinyStories).
# GQA 10/5 keeps the KV cache small; block 512 fits MPS memory.
vocab_size: 16384
block_size: 512
n_layers: 9
d_model: 640
n_heads: 10
n_kv_heads: 5
intermediate_size: 1728
norm_eps: 1.0e-5
rope_theta: 10000.0
dropout: 0.0
init_std: 0.02
use_bias: false
tie_word_embeddings: true
attn_impl: auto
