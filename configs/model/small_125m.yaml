# ~125M params. First useful-ish single-GPU run (A100/H100/4090).
vocab_size: 32768
block_size: 1024
n_layers: 12
d_model: 768
n_heads: 12
n_kv_heads: 4
intermediate_size: 2048
norm_eps: 1.0e-5
rope_theta: 10000.0
dropout: 0.0
init_std: 0.02
use_bias: false
tie_word_embeddings: true
attn_impl: auto
