arch_path: configs/model/tiny_24m.yaml
tokenizer:
  dir: artifacts/tokenizer/tinystories
data:
  prepared_dir: data/prepared/tinystories
optim:
  lr: 6.0e-4
  min_lr_ratio: 0.1
  weight_decay: 0.1
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 150
  schedule: cosine
train:
  device: auto
  dtype: auto          # bf16 on cuda, float32 on mps/cpu
  seed: 1337
  batch_size: 24
  grad_accum_steps: 1
  max_steps: 4000
  seq_len: 512
  log_interval: 25
  eval_interval: 500
  eval_iters: 50
  ckpt_interval: 500
  out_dir: runs/tinystories
