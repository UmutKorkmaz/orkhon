arch_path: configs/model/smoke_6m.yaml
init_from: runs/sft_smoke
tokenizer:
  dir: artifacts/tokenizer/smoke_tool
data:
  sft_path: data/tool/sft.jsonl
  val_sft_path: data/tool/sft_val.jsonl
optim:
  lr: 1.0e-4
  min_lr_ratio: 0.1
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 20
  schedule: cosine
train:
  device: auto
  dtype: float32
  seed: 1337
  batch_size: 8
  grad_accum_steps: 1
  max_steps: 600
  seq_len: 96
  log_interval: 25
  eval_interval: 200
  eval_iters: 20
  ckpt_interval: 300
  out_dir: runs/sft_tool_smoke
