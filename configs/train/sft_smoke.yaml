arch_path: configs/model/smoke_6m.yaml
init_from: runs/pretrain_smoke
tokenizer:
  dir: artifacts/tokenizer/smoke
data:
  sft_path: data/smoke/sft.jsonl
optim:
  lr: 1.0e-4
  min_lr_ratio: 0.1
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 10
  schedule: cosine
train:
  device: auto
  dtype: float32
  seed: 1337
  batch_size: 8
  grad_accum_steps: 1
  max_steps: 200
  seq_len: 256
  log_interval: 10
  eval_interval: 50
  eval_iters: 20
  ckpt_interval: 200
  out_dir: runs/sft_smoke
