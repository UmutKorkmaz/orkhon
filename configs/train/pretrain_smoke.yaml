arch_path: configs/model/smoke_6m.yaml
tokenizer:
  dir: artifacts/tokenizer/smoke
data:
  prepared_dir: data/prepared/smoke
optim:
  lr: 3.0e-4
  min_lr_ratio: 0.1
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 50
  schedule: cosine
train:
  device: auto
  dtype: float32
  seed: 1337
  batch_size: 16
  grad_accum_steps: 1
  max_steps: 600
  seq_len: 256
  log_interval: 10
  eval_interval: 100
  eval_iters: 50
  ckpt_interval: 300
  out_dir: runs/pretrain_smoke
