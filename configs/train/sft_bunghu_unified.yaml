# Upgrade the Bengu/Bunghu bilingual base into a unified EN/TR/Kokturk assistant.
arch_path: configs/model/bengu.yaml
init_from: models/bengu-20260615/checkpoint
tokenizer:
  dir: artifacts/tokenizer/bilingual
data:
  sft_path: data/instruct/unified_assistant_train.jsonl
  val_sft_path: data/instruct/unified_assistant_val.jsonl
optim:
  lr: 1.0e-4
  min_lr_ratio: 0.1
  weight_decay: 0.0
  grad_clip: 1.0
  warmup_steps: 80
  schedule: cosine
train:
  device: mps
  dtype: float32
  seed: 1337
  batch_size: 12
  grad_accum_steps: 1
  max_steps: 2200
  seq_len: 256
  log_interval: 25
  eval_interval: 250
  eval_iters: 40
  ckpt_interval: 500
  out_dir: runs/bunghu_unified
  compile: false
