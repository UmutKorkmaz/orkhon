name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/uv-cache-bilge
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run ruff check src/ tests/ --exit-zero || true
      - name: Run tests (fast)
        run: uv run pytest -q
